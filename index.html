<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>王国守卫战 - 塔防游戏</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background: #1a1a2e;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            display: flex;
            flex-direction: column;
            color: #fff;
        }
        
        /* 顶部状态栏 - 固定高度 */
        #top-bar {
            height: 50px;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            flex-shrink: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .stat-icon {
            font-size: 18px;
        }
        
        #wave-btn {
            padding: 8px 16px;
            background: #e94560;
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            min-height: 36px;
            min-width: 90px;
        }
        
        #wave-btn:disabled { 
            background: #666; 
            opacity: 0.7;
        }
        
        /* 游戏区域 - 自适应正方形 */
        #game-area {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f23;
            overflow: hidden;
        }
        
        #game-container {
            position: relative;
            width: 100%;
            max-width: 100vmin;
            aspect-ratio: 1 / 1;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #2d5a27;
        }
        
        /* 底部塔选择 - 横向滚动 */
        #bottom-bar {
            height: 110px;
            background: rgba(0,0,0,0.9);
            flex-shrink: 0;
            z-index: 100;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }
        
        #tower-scroll {
            display: flex;
            gap: 10px;
            padding: 8px 12px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        #tower-scroll::-webkit-scrollbar {
            display: none;
        }
        
        .tower-card {
            min-width: 75px;
            height: 90px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }
        
        .tower-card:active {
            transform: scale(0.95);
        }
        
        .tower-card.selected {
            border-color: #ffd700;
            background: rgba(255,215,0,0.2);
        }
        
        .tower-card.disabled {
            opacity: 0.3;
        }
        
        .tower-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #fff;
            margin-bottom: 4px;
        }
        
        .tower-name {
            font-size: 11px;
            color: #ccc;
            margin-bottom: 2px;
        }
        
        .tower-cost {
            font-size: 12px;
            color: #ffd700;
            font-weight: bold;
        }
        
        /* 操作提示 */
        #action-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 50;
        }
        
        #action-hint.show {
            opacity: 1;
        }
        
        /* 塔操作菜单 - 悬浮 */
        #tower-menu {
            position: absolute;
            background: rgba(0,0,0,0.95);
            padding: 15px;
            border-radius: 16px;
            display: none;
            z-index: 200;
            border: 2px solid #ffd700;
            min-width: 180px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        .menu-info {
            text-align: center;
            margin-bottom: 12px;
        }
        
        .menu-info .level { 
            color: #ffd700; 
            font-weight: bold; 
            font-size: 18px;
        }
        
        .menu-btn {
            width: 100%;
            padding: 14px;
            margin: 6px 0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            min-height: 48px;
        }
        
        .upgrade-btn { 
            background: #4ecca3; 
            color: #1a1a2e; 
        }
        
        .upgrade-btn:disabled { 
            background: #333; 
            color: #666; 
        }
        
        .sell-btn { 
            background: #e94560; 
            color: white; 
        }
        
        /* 覆盖层 */
        #overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            padding: 20px;
        }
        
        #overlay.active { 
            display: flex; 
        }
        
        #overlay h2 {
            font-size: 36px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        #overlay p {
            font-size: 16px;
            margin-bottom: 30px;
            color: #ccc;
            text-align: center;
        }
        
        .overlay-btn {
            padding: 16px 50px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            min-height: 56px;
            min-width: 180px;
        }
        
        #start-btn { 
            background: #4ecca3; 
            color: #1a1a2e; 
        }
        
        #restart-btn { 
            background: #e94560; 
            color: white; 
            display: none;
        }
        
        /* 设置按钮 */
        #settings-btn {
            position: absolute;
            top: 60px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.7);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 设置面板 */
        #settings-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 25px;
            border-radius: 20px;
            z-index: 250;
            display: none;
            min-width: 280px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        #settings-panel.active {
            display: block;
        }
        
        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .setting-label {
            font-size: 16px;
        }
        
        .toggle-switch {
            width: 50px;
            height: 28px;
            background: #444;
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .toggle-switch.active {
            background: #4ecca3;
        }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }
        
        .toggle-switch.active::after {
            transform: translateX(22px);
        }
        
        .close-settings {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #444;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 顶部状态栏 -->
    <div id="top-bar">
        <div class="stat-item">
            <span class="stat-icon">❤️</span>
            <span id="lives">20</span>
        </div>
        <div class="stat-item">
            <span class="stat-icon">💰</span>
            <span id="gold">150</span>
        </div>
        <div class="stat-item">
            <span class="stat-icon">🌊</span>
            <span id="wave">第1波</span>
        </div>
        <button id="wave-btn" onclick="game.startWave()">开始下一波</button>
    </div>
    
    <!-- 游戏区域 -->
    <div id="game-area">
        <div id="game-container">
            <canvas id="gameCanvas"></canvas>
            <div id="action-hint"></div>
        </div>
        <button id="settings-btn" onclick="game.toggleSettings()">⚙️</button>
    </div>
    
    <!-- 底部塔选择 -->
    <div id="bottom-bar">
        <div id="tower-scroll">
            <div class="tower-card" data-type="arrow" onclick="game.selectTower('arrow')">
                <img src="tower_arrow.png" class="tower-icon" alt="箭塔">
                <div class="tower-name">箭塔</div>
                <div class="tower-cost">50💰</div>
            </div>
            <div class="tower-card" data-type="cannon" onclick="game.selectTower('cannon')">
                <img src="tower_cannon.png" class="tower-icon" alt="炮塔">
                <div class="tower-name">炮塔</div>
                <div class="tower-cost">100💰</div>
            </div>
            <div class="tower-card" data-type="ice" onclick="game.selectTower('ice')">
                <img src="tower_ice.png" class="tower-icon" alt="冰塔">
                <div class="tower-name">冰塔</div>
                <div class="tower-cost">80💰</div>
            </div>
            <div class="tower-card" data-type="electric" onclick="game.selectTower('electric')">
                <img src="tower_electric.png" class="tower-icon" alt="电塔">
                <div class="tower-name">电塔</div>
                <div class="tower-cost">120💰</div>
            </div>
            <div class="tower-card" data-type="laser" onclick="game.selectTower('laser')">
                <img src="tower_laser.png" class="tower-icon" alt="激光">
                <div class="tower-name">激光</div>
                <div class="tower-cost">200💰</div>
            </div>
        </div>
    </div>
    
    <!-- 塔操作菜单 -->
    <div id="tower-menu">
        <div class="menu-info">
            <div class="level" id="menu-level">等级 1</div>
            <div id="menu-damage">伤害: 10</div>
        </div>
        <button class="menu-btn upgrade-btn" id="upgrade-btn" onclick="game.upgradeTower()">
            升级 (<span id="upgrade-cost">50</span>💰)
        </button>
        <button class="menu-btn sell-btn" onclick="game.sellTower()">
            出售 (+<span id="sell-price">25</span>💰)
        </button>
    </div>
    
    <!-- 设置面板 -->
    <div id="settings-panel">
        <h3 style="text-align:center;margin-bottom:15px;">游戏设置</h3>
        <div class="setting-item">
            <span class="setting-label">🔊 音效</span>
            <div class="toggle-switch active" id="sound-toggle" onclick="game.toggleSetting('sound')"></div>
        </div>
        <div class="setting-item">
            <span class="setting-label">📳 震动</span>
            <div class="toggle-switch active" id="vibrate-toggle" onclick="game.toggleSetting('vibrate')"></div>
        </div>
        <button class="close-settings" onclick="game.toggleSettings()">关闭</button>
    </div>
    
    <!-- 开始/结束覆盖层 -->
    <div id="overlay" class="active">
        <h2>王国守卫战</h2>
        <p>建造防御塔，抵御怪物入侵！<br>点击格子建造，点击塔升级</p>
        <button id="start-btn" class="overlay-btn" onclick="game.start()">开始游戏</button>
        <button id="restart-btn" class="overlay-btn" onclick="game.restart()">重新开始</button>
    </div>

    <script>
        // ========== 音频系统 ==========
        const AudioSys = {
            ctx: null,
            enabled: true,
            
            init() {
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {
                    console.log('Web Audio API not supported');
                }
            },
            
            play(type) {
                if (!this.enabled || !this.ctx) return;
                
                // 用户交互后解锁音频
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                switch(type) {
                    case 'shoot':
                        osc.frequency.value = 800;
                        osc.type = 'square';
                        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                        osc.start(this.ctx.currentTime);
                        osc.stop(this.ctx.currentTime + 0.1);
                        break;
                    case 'hit':
                        osc.frequency.value = 200;
                        osc.type = 'sawtooth';
                        gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                        osc.start(this.ctx.currentTime);
                        osc.stop(this.ctx.currentTime + 0.15);
                        break;
                    case 'build':
                        osc.frequency.value = 600;
                        osc.type = 'sine';
                        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                        osc.start(this.ctx.currentTime);
                        osc.stop(this.ctx.currentTime + 0.3);
                        break;
                    case 'upgrade':
                        osc.frequency.value = 1000;
                        osc.type = 'sine';
                        gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                        osc.start(this.ctx.currentTime);
                        osc.stop(this.ctx.currentTime + 0.5);
                        break;
                    case 'wave':
                        osc.frequency.value = 400;
                        osc.type = 'square';
                        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.8);
                        osc.start(this.ctx.currentTime);
                        osc.stop(this.ctx.currentTime + 0.8);
                        break;
                    case 'gameover':
                        [300, 250, 200, 150].forEach((freq, i) => {
                            const o = this.ctx.createOscillator();
                            const g = this.ctx.createGain();
                            o.connect(g);
                            g.connect(this.ctx.destination);
                            o.frequency.value = freq;
                            o.type = 'sawtooth';
                            g.gain.setValueAtTime(0.2, this.ctx.currentTime + i * 0.2);
                            g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + i * 0.2 + 0.3);
                            o.start(this.ctx.currentTime + i * 0.2);
                            o.stop(this.ctx.currentTime + i * 0.2 + 0.3);
                        });
                        break;
                }
            }
        };
        
        // ========== 震动系统 ==========
        const VibrateSys = {
            enabled: true,
            
            vibrate(pattern) {
                if (!this.enabled || !navigator.vibrate) return;
                navigator.vibrate(pattern);
            },
            
            shoot() { this.vibrate(10); },
            hit() { this.vibrate(20); },
            build() { this.vibrate([30, 50, 30]); },
            upgrade() { this.vibrate([50, 30, 50]); },
            wave() { this.vibrate([100, 50, 100]); },
            gameover() { this.vibrate([200, 100, 200, 100, 400]); }
        };
        
        // ========== 游戏配置 ==========
        const GRID_SIZE = 12; // 竖屏12x12格子
        const TILE_SIZE_BASE = 50;
        let TILE_SIZE = 50;
        
        // 竖屏路径（蛇形）
        const PATH = [
            {x: 1, y: 0}, {x: 1, y: 1}, {x: 1, y: 2}, {x: 1, y: 3},
            {x: 2, y: 3}, {x: 3, y: 3}, {x: 4, y: 3}, {x: 5, y: 3},
            {x: 5, y: 2}, {x: 5, y: 1},
            {x: 6, y: 1}, {x: 7, y: 1}, {x: 8, y: 1}, {x: 9, y: 1},
            {x: 9, y: 2}, {x: 9, y: 3}, {x: 9, y: 4}, {x: 9, y: 5},
            {x: 8, y: 5}, {x: 7, y: 5}, {x: 6, y: 5}, {x: 5, y: 5},
            {x: 5, y: 6}, {x: 5, y: 7},
            {x: 6, y: 7}, {x: 7, y: 7}, {x: 8, y: 7}, {x: 9, y: 7},
            {x: 9, y: 8}, {x: 9, y: 9}, {x: 9, y: 10},
            {x: 8, y: 10}, {x: 7, y: 10}, {x: 6, y: 10}, {x: 5, y: 10},
            {x: 5, y: 9}, {x: 5, y: 8},
            {x: 4, y: 8}, {x: 3, y: 8}, {x: 2, y: 8}, {x: 1, y: 8},
            {x: 1, y: 9}, {x: 1, y: 10}, {x: 1, y: 11}
        ];
        
        const TOWER_TYPES = {
            arrow: { name: '箭塔', cost: 50, damage: 15, range: 2.5, fireRate: 800, color: '#8B4513', projectile: 'arrow', image: 'tower_arrow.png' },
            cannon: { name: '炮塔', cost: 100, damage: 40, range: 2, fireRate: 1500, color: '#4a4a4a', projectile: 'cannon', splash: 2, image: 'tower_cannon.png' },
            ice: { name: '冰塔', cost: 80, damage: 8, range: 2, fireRate: 1000, color: '#87CEEB', projectile: 'ice', slow: 0.5, slowDuration: 2000, image: 'tower_ice.png' },
            electric: { name: '电塔', cost: 120, damage: 25, range: 2.8, fireRate: 600, color: '#FFD700', projectile: 'electric', chain: 3, image: 'tower_electric.png' },
            laser: { name: '激光', cost: 200, damage: 5, range: 3.5, fireRate: 100, color: '#FF0000', projectile: 'laser', continuous: true, image: 'tower_laser.png' }
        };
        
        const ENEMY_TYPES = {
            normal: { hp: 60, speed: 1.2, reward: 10, color: '#e74c3c', radius: 0.35, image: 'enemy_normal.png' },
            fast: { hp: 40, speed: 2.0, reward: 15, color: '#f39c12', radius: 0.3, image: 'enemy_fast.png' },
            tank: { hp: 150, speed: 0.7, reward: 25, color: '#8e44ad', radius: 0.4, image: 'enemy_tank.png' },
            boss: { hp: 500, speed: 0.4, reward: 100, color: '#c0392b', radius: 0.5, image: 'enemy_tank.png' }
        };
        
        const WAVES = [
            [{type: 'normal', count: 5, interval: 1000}],
            [{type: 'normal', count: 8, interval: 800}],
            [{type: 'fast', count: 5, interval: 600}],
            [{type: 'normal', count: 5, interval: 800}, {type: 'fast', count: 3, interval: 600}],
            [{type: 'tank', count: 3, interval: 1500}],
            [{type: 'fast', count: 8, interval: 400}],
            [{type: 'normal', count: 10, interval: 600}, {type: 'tank', count: 2, interval: 1200}],
            [{type: 'tank', count: 5, interval: 1000}, {type: 'fast', count: 5, interval: 500}],
            [{type: 'boss', count: 1, interval: 2000}],
            [{type: 'normal', count: 15, interval: 400}, {type: 'fast', count: 10, interval: 300}, {type: 'tank', count: 5, interval: 800}]
        ];
        
        // ========== 预加载图片 ==========
        const images = {};
        function preloadImages() {
            const imageList = [
                'tower_arrow.png', 'tower_cannon.png', 'tower_ice.png', 
                'tower_electric.png', 'tower_laser.png',
                'enemy_normal.png', 'enemy_fast.png', 'enemy_tank.png'
            ];
            
            imageList.forEach(src => {
                const img = new Image();
                img.src = src;
                images[src] = img;
            });
        }
        
        // ========== 游戏类 ==========
        class Tower {
            constructor(gx, gy, type) {
                this.gx = gx;
                this.gy = gy;
                this.x = (gx + 0.5) * TILE_SIZE;
                this.y = (gy + 0.5) * TILE_SIZE;
                this.type = type;
                this.level = 1;
                this.lastFire = 0;
                this.target = null;
                this.angle = 0;
                
                const config = TOWER_TYPES[type];
                this.damage = config.damage;
                this.range = config.range * TILE_SIZE;
                this.fireRate = config.fireRate;
                this.color = config.color;
                this.projectileType = config.projectile;
                this.image = config.image;
                this.config = config;
            }
            
            upgrade() {
                this.level++;
                this.damage = Math.floor(this.damage * 1.5);
                this.range = Math.floor(this.range * 1.1);
                if (this.fireRate > 100) this.fireRate = Math.floor(this.fireRate * 0.9);
            }
            
            getSellPrice() {
                const base = TOWER_TYPES[this.type].cost;
                const upgradeCost = base * 0.5 * (this.level - 1);
                return Math.floor((base + upgradeCost) * 0.6);
            }
            
            getUpgradeCost() {
                return Math.floor(TOWER_TYPES[this.type].cost * 0.7 * this.level);
            }
            
            update(enemies, now, projectiles) {
                if (!this.target || !this.target.alive || this.distanceTo(this.target) > this.range) {
                    this.target = this.findTarget(enemies);
                }
                
                if (this.target) {
                    this.angle = Math.atan2(this.target.y - this.y, this.target.x - this.x);
                    
                    if (this.config.continuous && now - this.lastFire > this.fireRate) {
                        this.target.takeDamage(this.damage);
                        this.lastFire = now;
                        projectiles.push(new Projectile(this.x, this.y, this.target, 'laser', this.damage, 0));
                        AudioSys.play('shoot');
                        VibrateSys.shoot();
                    } else if (!this.config.continuous && now - this.lastFire > this.fireRate) {
                        this.fire(projectiles);
                        this.lastFire = now;
                    }
                }
            }
            
            findTarget(enemies) {
                let closest = null;
                let minDist = Infinity;
                
                for (const enemy of enemies) {
                    if (!enemy.alive) continue;
                    const dist = this.distanceTo(enemy);
                    if (dist <= this.range && dist < minDist) {
                        minDist = dist;
                        closest = enemy;
                    }
                }
                return closest;
            }
            
            distanceTo(target) {
                return Math.hypot(target.x - this.x, target.y - this.y);
            }
            
            fire(projectiles) {
                if (this.target) {
                    projectiles.push(new Projectile(this.x, this.y, this.target, this.projectileType, this.damage, this.config));
                    AudioSys.play('shoot');
                    VibrateSys.shoot();
                }
            }
            
            draw(ctx) {
                const size = TILE_SIZE * 0.4;
                
                // 范围圈
                if (game.selectedTower === this) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.range, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
                
                // 基座
                ctx.fillStyle = '#444';
                ctx.fillRect(this.x - size, this.y - size, size * 2, size * 2);
                
                // 头像
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, size * 0.85, 0, Math.PI * 2);
                ctx.clip();
                
                const img = images[this.image];
                if (img && img.complete) {
                    ctx.drawImage(img, this.x - size, this.y - size, size * 2, size * 2);
                } else {
                    ctx.fillStyle = this.color;
                    ctx.fillRect(this.x - size, this.y - size, size * 2, size * 2);
                }
                ctx.restore();
                
                // 边框
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, size * 0.85, 0, Math.PI * 2);
                ctx.stroke();
                
                // 等级
                if (this.level > 1) {
                    ctx.fillStyle = '#ffd700';
                    ctx.font = `bold ${Math.max(10, TILE_SIZE * 0.2)}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText('★' + this.level, this.x, this.y - size - 4);
                }
            }
        }
        
        class Enemy {
            constructor(type, pathIndex = 0) {
                const config = ENEMY_TYPES[type];
                this.type = type;
                this.maxHp = config.hp;
                this.hp = config.hp;
                this.baseSpeed = config.speed;
                this.speed = config.speed;
                this.reward = config.reward;
                this.color = config.color;
                this.radius = config.radius * TILE_SIZE;
                this.image = config.image;
                this.pathIndex = pathIndex;
                this.alive = true;
                this.reachedEnd = false;
                this.slowTimer = 0;
                
                const start = PATH[0];
                this.x = (start.x + 0.5) * TILE_SIZE;
                this.y = (start.y + 0.5) * TILE_SIZE;
            }
            
            takeDamage(damage) {
                this.hp -= damage;
                if (this.hp <= 0) {
                    this.alive = false;
                    game.gold += this.reward;
                    game.updateUI();
                    AudioSys.play('hit');
                    VibrateSys.hit();
                }
            }
            
            applySlow(factor, duration) {
                if (this.slowTimer <= 0) {
                    this.speed = this.baseSpeed * factor;
                }
                this.slowTimer = Math.max(this.slowTimer, duration);
            }
            
            update(deltaTime) {
                if (!this.alive) return;
                
                if (this.slowTimer > 0) {
                    this.slowTimer -= deltaTime;
                    if (this.slowTimer <= 0) {
                        this.speed = this.baseSpeed;
                    }
                }
                
                if (this.pathIndex >= PATH.length - 1) {
                    this.reachedEnd = true;
                    this.alive = false;
                    game.lives--;
                    game.updateUI();
                    if (game.lives <= 0) game.gameOver();
                    return;
                }
                
                const target = PATH[this.pathIndex + 1];
                const tx = (target.x + 0.5) * TILE_SIZE;
                const ty = (target.y + 0.5) * TILE_SIZE;
                
                const dx = tx - this.x;
                const dy = ty - this.y;
                const dist = Math.hypot(dx, dy);
                
                if (dist < 5) {
                    this.pathIndex++;
                } else {
                    const moveDist = this.speed * (deltaTime / 16) * (TILE_SIZE / 50);
                    this.x += (dx / dist) * moveDist;
                    this.y += (dy / dist) * moveDist;
                }
            }
            
            draw(ctx) {
                if (!this.alive) return;
                
                // 头像
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.clip();
                
                const img = images[this.image];
                if (img && img.complete) {
                    ctx.drawImage(img, this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
                } else {
                    ctx.fillStyle = this.color;
                    ctx.fillRect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
                }
                ctx.restore();
                
                // 边框
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
                
                // 减速效果
                if (this.slowTimer > 0) {
                    ctx.strokeStyle = '#87CEEB';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 4, 0, Math.PI * 2);
                    ctx.stroke();
                }
                
                // 血条
                const barWidth = TILE_SIZE * 0.6;
                const barHeight = Math.max(4, TILE_SIZE * 0.08);
                const barX = this.x - barWidth / 2;
                const barY = this.y - this.radius - barHeight - 3;
                
                ctx.fillStyle = '#333';
                ctx.fillRect(barX, barY, barWidth, barHeight);
                
                const hpPercent = this.hp / this.maxHp;
                ctx.fillStyle = hpPercent > 0.5 ? '#2ecc71' : hpPercent > 0.25 ? '#f39c12' : '#e74c3c';
                ctx.fillRect(barX, barY, barWidth * hpPercent, barHeight);
            }
        }
        
        class Projectile {
            constructor(x, y, target, type, damage, config) {
                this.x = x;
                this.y = y;
                this.target = target;
                this.type = type;
                this.damage = damage;
                this.config = config;
                this.speed = 8 * (TILE_SIZE / 50);
                this.alive = true;
                
                if (type === 'laser') {
                    this.alive = false;
                }
            }
            
            update() {
                if (!this.alive) return;
                if (this.type === 'laser') return;
                
                if (!this.target.alive) {
                    this.alive = false;
                    return;
                }
                
                const dx = this.target.x - this.x;
                const dy = this.target.y - this.y;
                const dist = Math.hypot(dx, dy);
                
                if (dist < 10) {
                    this.hit();
                } else {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }
            }
            
            hit() {
                this.alive = false;
                
                if (this.type === 'cannon' && this.config && this.config.splash) {
                    const splashPx = this.config.splash * TILE_SIZE;
                    for (const enemy of game.enemies) {
                        if (!enemy.alive) continue;
                        const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                        if (dist <= splashPx) {
                            enemy.takeDamage(Math.floor(this.damage * (1 - dist / splashPx)));
                        }
                    }
                    game.effects.push(new Effect(this.x, this.y, 'explosion', splashPx));
                } else if (this.type === 'ice' && this.config) {
                    this.target.takeDamage(this.damage);
                    this.target.applySlow(this.config.slow, this.config.slowDuration);
                } else if (this.type === 'electric' && this.config && this.config.chain) {
                    this.chainDamage([this.target], this.config.chain);
                } else {
                    this.target.takeDamage(this.damage);
                }
            }
            
            chainDamage(hitEnemies, chainsLeft) {
                const last = hitEnemies[hitEnemies.length - 1];
                last.takeDamage(this.damage);
                
                if (chainsLeft <= 1) return;
                
                let closest = null;
                let minDist = TILE_SIZE * 2;
                
                for (const enemy of game.enemies) {
                    if (!enemy.alive || hitEnemies.includes(enemy)) continue;
                    const dist = Math.hypot(enemy.x - last.x, enemy.y - last.y);
                    if (dist < minDist) {
                        minDist = dist;
                        closest = enemy;
                    }
                }
                
                if (closest) {
                    hitEnemies.push(closest);
                    game.effects.push(new Effect(last.x, last.y, 'lightning', 0, closest.x, closest.y));
                    this.chainDamage(hitEnemies, chainsLeft - 1);
                }
            }
            
            draw(ctx) {
                if (this.type === 'laser') {
                    ctx.strokeStyle = '#FF0000';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.target.x, this.target.y);
                    ctx.stroke();
                    return;
                }
                
                ctx.fillStyle = this.getColor();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.getSize(), 0, Math.PI * 2);
                ctx.fill();
            }
            
            getColor() {
                const colors = { arrow: '#8B4513', cannon: '#333', ice: '#87CEEB', electric: '#FFD700', laser: '#FF0000' };
                return colors[this.type] || '#fff';
            }
            
            getSize() {
                const sizes = { arrow: 4, cannon: 6, ice: 5, electric: 4 };
                return sizes[this.type] * (TILE_SIZE / 50) || 4;
            }
        }
        
        class Effect {
            constructor(x, y, type, size, x2, y2) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.size = size || 20;
                this.life = 1;
                this.decay = 0.05;
                this.x2 = x2;
                this.y2 = y2;
            }
            
            update() {
                this.life -= this.decay;
                return this.life > 0;
            }
            
            draw(ctx) {
                ctx.globalAlpha = this.life;
                
                if (this.type === 'explosion') {
                    ctx.fillStyle = '#ff6600';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * (1 - this.life) * 2, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.type === 'lightning') {
                    ctx.strokeStyle = '#FFD700';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x2, this.y2);
                    ctx.stroke();
                }
                
                ctx.globalAlpha = 1;
            }
        }
        
        // ========== 主游戏类 ==========
        class Game {
            constructor() {
                this.towers = [];
                this.enemies = [];
                this.projectiles = [];
                this.effects = [];
                this.gold = 150;
                this.lives = 20;
                this.wave = 0;
                this.waveActive = false;
                this.selectedTowerType = null;
                this.selectedTower = null;
                this.placingTower = false;
                this.gameRunning = false;
                this.lastTime = 0;
                this.mouseX = 0;
                this.mouseY = 0;
                this.settingsOpen = false;
                
                preloadImages();
                this.initCanvas();
                this.setupInput();
                this.updateUI();
                
                // 初始化音频（需要用户交互）
                document.addEventListener('click', () => {
                    if (!AudioSys.ctx) AudioSys.init();
                }, { once: true });
            }
            
            initCanvas() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                
                window.addEventListener('resize', () => this.resize());
                window.addEventListener('orientationchange', () => setTimeout(() => this.resize(), 300));
            }
            
            resize() {
                const container = document.getElementById('game-container');
                const size = Math.min(container.clientWidth, container.clientHeight);
                
                // 计算格子大小
                TILE_SIZE = size / GRID_SIZE;
                
                // 设置画布
                const dpr = window.devicePixelRatio || 1;
                this.canvas.width = size * dpr;
                this.canvas.height = size * dpr;
                this.canvas.style.width = size + 'px';
                this.canvas.style.height = size + 'px';
                
                this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                this.ctx.scale(size / (GRID_SIZE * TILE_SIZE_BASE), size / (GRID_SIZE * TILE_SIZE_BASE));
            }
            
            toGameCoord(clientX, clientY) {
                const rect = this.canvas.getBoundingClientRect();
                const scaleX = (GRID_SIZE * TILE_SIZE) / rect.width;
                const scaleY = (GRID_SIZE * TILE_SIZE) / rect.height;
                return {
                    x: (clientX - rect.left) * scaleX,
                    y: (clientY - rect.top) * scaleY
                };
            }
            
            setupInput() {
                // 触摸支持
                const handleStart = (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    this.handleInput(touch.clientX, touch.clientY);
                };
                
                const handleMove = (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const coord = this.toGameCoord(touch.clientX, touch.clientY);
                    this.mouseX = coord.x;
                    this.mouseY = coord.y;
                };
                
                this.canvas.addEventListener('touchstart', handleStart, { passive: false });
                this.canvas.addEventListener('touchmove', handleMove, { passive: false });
                this.canvas.addEventListener('touchend', (e) => e.preventDefault());
                
                // 鼠标支持
                this.canvas.addEventListener('click', (e) => this.handleInput(e.clientX, e.clientY));
                this.canvas.addEventListener('mousemove', (e) => {
                    const coord = this.toGameCoord(e.clientX, e.clientY);
                    this.mouseX = coord.x;
                    this.mouseY = coord.y;
                });
                
                // 防止页面行为
                document.addEventListener('touchmove', (e) => {
                    if (e.target === this.canvas) e.preventDefault();
                }, { passive: false });
            }
            
            handleInput(clientX, clientY) {
                if (this.settingsOpen) return;
                
                const coord = this.toGameCoord(clientX, clientY);
                const gx = Math.floor(coord.x / TILE_SIZE);
                const gy = Math.floor(coord.y / TILE_SIZE);
                
                // 检查已有塔
                let clickedTower = null;
                for (const t of this.towers) {
                    if (t.gx === gx && t.gy === gy) {
                        clickedTower = t;
                        break;
                    }
                }
                
                if (clickedTower) {
                    this.selectedTower = clickedTower;
                    this.selectedTowerType = null;
                    this.placingTower = false;
                    this.updateTowerPanel();
                    this.showTowerMenu(clickedTower);
                    return;
                }
                
                // 建造
                if (this.placingTower && this.selectedTowerType) {
                    if (this.canPlaceTower(gx, gy)) {
                        this.placeTower(gx, gy);
                    } else {
                        this.showHint('不能在这里建造！');
                    }
                } else {
                    this.selectedTower = null;
                    this.hideTowerMenu();
                }
            }
            
            canPlaceTower(gx, gy) {
                // 边界检查
                if (gx < 0 || gx >= GRID_SIZE || gy < 0 || gy >= GRID_SIZE) return false;
                
                // 路径检查
                for (const p of PATH) {
                    if (p.x === gx && p.y === gy) return false;
                }
                
                // 已有塔检查
                for (const t of this.towers) {
                    if (t.gx === gx && t.gy === gy) return false;
                }
                
                return true;
            }
            
            placeTower(gx, gy) {
                const config = TOWER_TYPES[this.selectedTowerType];
                if (this.gold < config.cost) {
                    this.showHint('金币不足！');
                    return;
                }
                
                this.towers.push(new Tower(gx, gy, this.selectedTowerType));
                this.gold -= config.cost;
                this.updateUI();
                
                AudioSys.play('build');
                VibrateSys.build();
                
                // 连续建造同类型
                if (this.gold < config.cost) {
                    this.selectedTowerType = null;
                    this.placingTower = false;
                    this.updateTowerPanel();
                }
            }
            
            selectTower(type) {
                if (this.selectedTowerType === type) {
                    this.selectedTowerType = null;
                    this.placingTower = false;
                } else {
                    this.selectedTowerType = type;
                    this.placingTower = true;
                    this.selectedTower = null;
                    this.hideTowerMenu();
                }
                this.updateTowerPanel();
            }
            
            upgradeTower() {
                if (!this.selectedTower) return;
                
                const cost = this.selectedTower.getUpgradeCost();
                if (this.gold < cost || this.selectedTower.level >= 5) {
                    this.showHint('无法升级！');
                    return;
                }
                
                this.gold -= cost;
                this.selectedTower.upgrade();
                this.updateUI();
                this.showTowerMenu(this.selectedTower);
                
                AudioSys.play('upgrade');
                VibrateSys.upgrade();
            }
            
            sellTower() {
                if (!this.selectedTower) return;
                
                this.gold += this.selectedTower.getSellPrice();
                this.towers = this.towers.filter(t => t !== this.selectedTower);
                this.selectedTower = null;
                this.hideTowerMenu();
                this.updateUI();
            }
            
            showTowerMenu(tower) {
                const menu = document.getElementById('tower-menu');
                const rect = this.canvas.getBoundingClientRect();
                
                // 计算位置
                let menuX = rect.left + (tower.gx + 1) * TILE_SIZE * (rect.width / (GRID_SIZE * TILE_SIZE));
                let menuY = rect.top + tower.gy * TILE_SIZE * (rect.height / (GRID_SIZE * TILE_SIZE));
                
                // 边界调整
                if (menuX + 200 > window.innerWidth) menuX = rect.left + tower.gx * TILE_SIZE * (rect.width / (GRID_SIZE * TILE_SIZE)) - 190;
                if (menuY + 200 > window.innerHeight) menuY = rect.top + (tower.gy - 1) * TILE_SIZE * (rect.height / (GRID_SIZE * TILE_SIZE)) - 150;
                
                menu.style.left = menuX + 'px';
                menu.style.top = menuY + 'px';
                menu.style.display = 'block';
                
                document.getElementById('menu-level').textContent = `等级 ${tower.level}`;
                document.getElementById('menu-damage').textContent = `伤害: ${tower.damage}`;
                
                const upgradeCost = tower.getUpgradeCost();
                document.getElementById('upgrade-cost').textContent = upgradeCost;
                document.getElementById('sell-price').textContent = tower.getSellPrice();
                
                const upgradeBtn = document.getElementById('upgrade-btn');
                upgradeBtn.disabled = tower.level >= 5 || this.gold < upgradeCost;
            }
            
            hideTowerMenu() {
                document.getElementById('tower-menu').style.display = 'none';
            }
            
            showHint(text) {
                const hint = document.getElementById('action-hint');
                hint.textContent = text;
                hint.classList.add('show');
                setTimeout(() => hint.classList.remove('show'), 1500);
            }
            
            startWave() {
                if (this.waveActive || this.wave >= WAVES.length) return;
                
                this.waveActive = true;
                this.wave++;
                document.getElementById('wave-btn').disabled = true;
                this.updateUI();
                
                AudioSys.play('wave');
                VibrateSys.wave();
                
                const waveConfig = JSON.parse(JSON.stringify(WAVES[this.wave - 1] || WAVES[WAVES.length - 1]));
                let totalEnemies = 0;
                waveConfig.forEach(group => totalEnemies += group.count);
                
                let spawned = 0;
                const spawnNext = () => {
                    if (spawned >= totalEnemies) return;
                    
                    for (const group of waveConfig) {
                        if (group.count > 0) {
                            group.count--;
                            this.enemies.push(new Enemy(group.type));
                            spawned++;
                            setTimeout(spawnNext, group.interval);
                            return;
                        }
                    }
                };
                
                spawnNext();
            }
            
            toggleSettings() {
                this.settingsOpen = !this.settingsOpen;
                document.getElementById('settings-panel').classList.toggle('active', this.settingsOpen);
            }
            
            toggleSetting(type) {
                if (type === 'sound') {
                    AudioSys.enabled = !AudioSys.enabled;
                    document.getElementById('sound-toggle').classList.toggle('active', AudioSys.enabled);
                } else {
                    VibrateSys.enabled = !VibrateSys.enabled;
                    document.getElementById('vibrate-toggle').classList.toggle('active', VibrateSys.enabled);
                }
            }
            
            start() {
                document.getElementById('overlay').classList.remove('active');
                this.gameRunning = true;
                this.loop(0);
            }
            
            gameOver() {
                this.gameRunning = false;
                AudioSys.play('gameover');
                VibrateSys.gameover();
                
                document.getElementById('overlay').classList.add('active');
                document.querySelector('#overlay h2').textContent = '游戏结束';
                document.querySelector('#overlay p').innerHTML = `你坚持到了第 ${this.wave} 波！<br>最终金币: ${this.gold}`;
                document.getElementById('start-btn').style.display = 'none';
                document.getElementById('restart-btn').style.display = 'block';
            }
            
            restart() {
                this.towers = [];
                this.enemies = [];
                this.projectiles = [];
                this.effects = [];
                this.gold = 150;
                this.lives = 20;
                this.wave = 0;
                this.waveActive = false;
                this.selectedTowerType = null;
                this.selectedTower = null;
                this.placingTower = false;
                this.gameRunning = true;
                
                document.getElementById('overlay').classList.remove('active');
                document.getElementById('start-btn').style.display = 'block';
                document.getElementById('restart-btn').style.display = 'none';
                
                this.updateUI();
                this.loop(0);
            }
            
            updateTowerPanel() {
                document.querySelectorAll('.tower-card').forEach(card => {
                    const type = card.dataset.type;
                    const cost = TOWER_TYPES[type].cost;
                    
                    card.classList.remove('selected', 'disabled');
                    
                    if (this.selectedTowerType === type) {
                        card.classList.add('selected');
                    }
                    
                    if (this.gold < cost) {
                        card.classList.add('disabled');
                    }
                });
            }
            
            updateUI() {
                document.getElementById('lives').textContent = this.lives;
                document.getElementById('gold').textContent = this.gold;
                document.getElementById('wave').textContent = `第${this.wave}波`;
                
                const waveBtn = document.getElementById('wave-btn');
                if (this.wave >= WAVES.length && !this.waveActive) {
                    waveBtn.textContent = '无尽模式';
                } else {
                    waveBtn.textContent = this.waveActive ? '战斗中' : '开始下一波';
                }
                waveBtn.disabled = this.waveActive;
                
                this.updateTowerPanel();
            }
            
            loop(timestamp) {
                if (!this.gameRunning) return;
                
                const deltaTime = timestamp - this.lastTime;
                this.lastTime = timestamp;
                
                this.update(deltaTime);
                this.draw();
                
                requestAnimationFrame((t) => this.loop(t));
            }
            
            update(deltaTime) {
                this.enemies = this.enemies.filter(e => e.alive || e.reachedEnd);
                for (const enemy of this.enemies) {
                    enemy.update(deltaTime);
                }
                
                const now = Date.now();
                for (const tower of this.towers) {
                    tower.update(this.enemies, now, this.projectiles);
                }
                
                this.projectiles = this.projectiles.filter(p => p.alive);
                for (const p of this.projectiles) {
                    p.update();
                }
                
                this.effects = this.effects.filter(e => e.update());
                
                if (this.waveActive && this.enemies.filter(e => e.alive).length === 0 && 
                    this.enemies.every(e => !e.alive)) {
                    this.waveActive = false;
                    document.getElementById('wave-btn').disabled = false;
                    this.gold += 50 + this.wave * 10;
                    this.updateUI();
                }
                
                this.updateUI();
            }
            
            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, GRID_SIZE * TILE_SIZE, GRID_SIZE * TILE_SIZE);
                
                // 背景
                ctx.fillStyle = '#2d5a27';
                ctx.fillRect(0, 0, GRID_SIZE * TILE_SIZE, GRID_SIZE * TILE_SIZE);
                
                // 网格
                ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                ctx.lineWidth = 1;
                for (let i = 0; i <= GRID_SIZE; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * TILE_SIZE, 0);
                    ctx.lineTo(i * TILE_SIZE, GRID_SIZE * TILE_SIZE);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i * TILE_SIZE);
                    ctx.lineTo(GRID_SIZE * TILE_SIZE, i * TILE_SIZE);
                    ctx.stroke();
                }
                
                // 路径
                ctx.fillStyle = '#8B7355';
                for (const p of PATH) {
                    ctx.fillRect(p.x * TILE_SIZE, p.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                }
                
                // 路径连接线
                ctx.strokeStyle = '#A0826D';
                ctx.lineWidth = TILE_SIZE * 0.6;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                for (let i = 0; i < PATH.length; i++) {
                    const x = (PATH[i].x + 0.5) * TILE_SIZE;
                    const y = (PATH[i].y + 0.5) * TILE_SIZE;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
                
                // 起点终点
                const start = PATH[0];
                const end = PATH[PATH.length - 1];
                ctx.fillStyle = '#27ae60';
                ctx.fillRect(start.x * TILE_SIZE, start.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(end.x * TILE_SIZE, end.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                
                ctx.fillStyle = '#fff';
                ctx.font = `bold ${Math.max(10, TILE_SIZE * 0.25)}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText('起', (start.x + 0.5) * TILE_SIZE, (start.y + 0.5) * TILE_SIZE + 5);
                ctx.fillText('终', (end.x + 0.5) * TILE_SIZE, (end.y + 0.5) * TILE_SIZE + 5);
                
                // 塔
                for (const tower of this.towers) {
                    tower.draw(ctx);
                }
                
                // 建造预览
                if (this.placingTower && this.selectedTowerType) {
                    const gx = Math.floor(this.mouseX / TILE_SIZE);
                    const gy = Math.floor(this.mouseY / TILE_SIZE);
                    const x = (gx + 0.5) * TILE_SIZE;
                    const y = (gy + 0.5) * TILE_SIZE;
                    const config = TOWER_TYPES[this.selectedTowerType];
                    
                    // 范围
                    ctx.beginPath();
                    ctx.arc(x, y, config.range * TILE_SIZE, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    
                    // 放置区域
                    const canPlace = this.canPlaceTower(gx, gy);
                    ctx.fillStyle = canPlace ? 'rgba(78, 204, 163, 0.4)' : 'rgba(233, 69, 96, 0.4)';
                    ctx.fillRect(gx * TILE_SIZE, gy * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                }
                
                // 敌人
                for (const enemy of this.enemies) {
                    enemy.draw(ctx);
                }
                
                // 子弹
                for (const p of this.projectiles) {
                    p.draw(ctx);
                }
                
                // 特效
                for (const e of this.effects) {
                    e.draw(ctx);
                }
            }
        }
        
        // 启动
        const game = new Game();
    </script>
</body>
